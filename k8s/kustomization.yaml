# ═══════════════════════════════════════════════════════════════
# UPSC PREPX-AI - KUSTOMIZE CONFIGURATION
# Declarative Kubernetes deployment management
# ═══════════════════════════════════════════════════════════════

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: upsc-prepx-ai

commonLabels:
  app.kubernetes.io/name: upsc-prepx-ai
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: upsc-prepx-ai

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secrets.yaml
  - tls-secret.yaml
  - deployment-web.yaml
  - deployment-api.yaml
  - deployment-worker.yaml
  - services.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicies.yaml

# Common annotations for all resources
commonAnnotations:
  app.kubernetes.io/version: "1.0.0"
  managed-by: upsc-platform-team

# Images to use (override for different environments)
images:
  - name: ghcr.io/varuniclinic07/upsc_ai-web
    newName: ghcr.io/varuniclinic07/upsc_ai-web
    newTag: production
  - name: ghcr.io/varuniclinic07/upsc_ai-api
    newName: ghcr.io/varuniclinic07/upsc_ai-api
    newTag: production
  - name: ghcr.io/varuniclinic07/upsc_ai-worker
    newName: ghcr.io/varuniclinic07/upsc_ai-worker
    newTag: production

# ConfigMap and Secret generators
configMapGenerator: []

secretGenerator: []

# Patches for environment-specific overrides
patches: []
