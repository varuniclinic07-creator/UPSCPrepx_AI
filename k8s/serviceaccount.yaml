# ═══════════════════════════════════════════════════════════════
# UPSC PREPX-AI - SERVICE ACCOUNT
# For pod identity and RBAC
# ═══════════════════════════════════════════════════════════════

apiVersion: v1
kind: ServiceAccount
metadata:
  name: upsc-service-account
  namespace: upsc-prepx-ai
  labels:
    app.kubernetes.io/name: upsc-prepx-ai
  annotations:
    description: "Service account for UPSC PrepX-AI pods"

---
# ═══════════════════════════════════════════════════════════════
# RBAC ROLE - Minimal permissions for pods
# ═══════════════════════════════════════════════════════════════

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: upsc-pod-reader
  namespace: upsc-prepx-ai
  labels:
    app.kubernetes.io/name: upsc-prepx-ai
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]

---
# ═══════════════════════════════════════════════════════════════
# RBAC ROLE BINDING
# ═══════════════════════════════════════════════════════════════

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: upsc-pod-reader-binding
  namespace: upsc-prepx-ai
  labels:
    app.kubernetes.io/name: upsc-prepx-ai
subjects:
  - kind: ServiceAccount
    name: upsc-service-account
    namespace: upsc-prepx-ai
roleRef:
  kind: Role
  name: upsc-pod-reader
  apiGroup: rbac.authorization.k8s.io
