# ═══════════════════════════════════════════════════════════════
# UPSC PREPX-AI - TLS SECRET
# Option 1: cert-manager (recommended for production)
# Option 2: Manual TLS secret
# ═══════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════
# OPTION 1: ClusterIssuer for cert-manager (Let's Encrypt)
# ═══════════════════════════════════════════════════════════════

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@aimasteryedu.in
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# ═══════════════════════════════════════════════════════════════
# OPTION 2: Manual TLS Secret (if not using cert-manager)
# Generate with:
# openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#   -keyout tls.key -out tls.crt \
#   -subj "/CN=upscbyvarunsh.aimasteryedu.in"
# kubectl create secret tls upsc-tls-secret --cert=tls.crt --key=tls.key -n upsc-prepx-ai
# ═══════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: upsc-tls-secret
  namespace: upsc-prepx-ai
  labels:
    app.kubernetes.io/name: upsc-tls
type: kubernetes.io/tls
data:
  # Replace with actual base64-encoded cert and key
  # cat tls.crt | base64 -w 0
  # cat tls.key | base64 -w 0
  tls.crt: ""
  tls.key: ""
