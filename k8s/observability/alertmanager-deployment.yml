apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secret
  namespace: observability
  labels:
    app: alertmanager
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.sendgrid.net:587'
      smtp_from: 'alerts@upsc-prepx.ai'
      smtp_auth_username: 'apikey'
      smtp_auth_password: '${SENDGRID_API_KEY}'

    route:
      receiver: 'default-receiver'
      group_by: ['alertname', 'severity', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-slack'
          continue: true
          group_wait: 10s
          repeat_interval: 1h

        - match:
            severity: high
          receiver: 'slack-email'
          group_wait: 1m
          repeat_interval: 2h

        - match:
            severity: warning
          receiver: 'slack-only'
          repeat_interval: 6h

    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ['alertname', 'service']

    receivers:
      - name: 'default-receiver'
        webhook_configs:
          - url: 'http://webhook-receiver:5001/alerts'
            send_resolved: true

      - name: 'pagerduty-slack'
        pagerduty_configs:
          - service_key: '${PAGERDUTY_SERVICE_KEY}'
            severity: critical
        slack_configs:
          - channel: '#critical-alerts'
            send_resolved: true
            title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'

      - name: 'slack-email'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '⚠️ HIGH: {{ .GroupLabels.alertname }}'
        email_configs:
          - to: 'oncall@upsc-prepx.ai'
            subject: '[UPSC PrepX-AI] {{ .GroupLabels.alertname }}'

      - name: 'slack-only'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '⚠️ {{ .GroupLabels.alertname }}'

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
    spec:
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.external-url=http://alertmanager:9093"
          ports:
            - containerPort: 9093
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
      volumes:
        - name: config
          secret:
            secretName: alertmanager-secret
        - name: storage
          persistentVolumeClaim:
            claimName: alertmanager-storage
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-storage
  namespace: observability
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 9093
      protocol: TCP
      name: http
  selector:
    app: alertmanager
