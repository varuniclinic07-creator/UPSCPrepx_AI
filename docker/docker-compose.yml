# ═══════════════════════════════════════════════════════════════
# UPSC CSE MASTER - DOCKER COMPOSE (Development)
# Full stack development environment with all services
# ═══════════════════════════════════════════════════════════════

services:
  # ═══════════════════════════════════════════════════════════
  # WEB APPLICATION (Next.js)
  # ═══════════════════════════════════════════════════════════
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      target: runner
    container_name: upsc-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - REDIS_URL=redis://:devpassword@redis:6379
      - DATABASE_URL=postgresql://postgres:devpassword@postgres:5432/upsc_db
      - SUPABASE_URL=http://supabase:8000
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - upsc-network
    volumes:
      - ../public:/app/public:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ═══════════════════════════════════════════════════════════
  # API SERVER
  # ═══════════════════════════════════════════════════════════
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      target: runner
    container_name: upsc-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://:devpassword@redis:6379
      - DATABASE_URL=postgresql://postgres:devpassword@postgres:5432/upsc_db
      - SUPABASE_URL=http://supabase:8000
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      - redis
      - postgres
    networks:
      - upsc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ═══════════════════════════════════════════════════════════
  # WORKER (BullMQ)
  # ═══════════════════════════════════════════════════════════
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      target: runner
    container_name: upsc-worker
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - REDIS_URL=redis://:devpassword@redis:6379
      - DATABASE_URL=postgresql://postgres:devpassword@postgres:5432/upsc_db
      - SUPABASE_URL=http://supabase:8000
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - KILO_API_KEY=${KILO_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - redis
      - postgres
    networks:
      - upsc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ═══════════════════════════════════════════════════════════
  # REDIS (Cache + Queue)
  # ═══════════════════════════════════════════════════════════
  redis:
    image: redis:7.2-alpine
    container_name: upsc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass devpassword --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - upsc-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devpassword", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ═══════════════════════════════════════════════════════════
  # POSTGRES (Database)
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: postgres:15.6-alpine
    container_name: upsc-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=upsc_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - upsc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ═══════════════════════════════════════════════════════════
  # SUPABASE (Local Development)
  # ═══════════════════════════════════════════════════════════
  supabase:
    image: supabase/postgres:15.1.1.78
    container_name: upsc-supabase
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "54322:5432"
    environment:
      - POSTGRES_PASSWORD=devpassword
      - SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ANON_KEY=${SUPABASE_ANON_KEY}
      - JWT_SECRET=super-secret-jwt-secret
    volumes:
      - supabase_data:/var/lib/postgresql/data
    networks:
      - upsc-network
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════
  # PGADMIN (Database Management - Optional)
  # ═══════════════════════════════════════════════════════════
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: upsc-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@upsc.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - upsc-network
    depends_on:
      - postgres
    profiles:
      - tools

networks:
  upsc-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  supabase_data:
    driver: local
  pgadmin_data:
    driver: local
