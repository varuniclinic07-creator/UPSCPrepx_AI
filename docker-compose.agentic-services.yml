version: '3.8'

services:
  # Autodoc Thinker - Documentation & Explanation Generator
  autodoc-thinker:
    image: python:3.11-slim
    container_name: upsc-autodoc
    restart: unless-stopped
    working_dir: /app
    command: python -m http.server 8031
    ports:
      - "8031:8031"
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8031/health"]
      interval: 2m
      timeout: 10s
      retries: 3
    labels:
      - "coolify.managed=true"
      - "coolify.service=autodoc"

  # File Search - Semantic Search Service
  file-search:
    image: python:3.11-slim
    container_name: upsc-file-search
    restart: unless-stopped
    working_dir: /app
    command: python -m http.server 8032
    ports:
      - "8032:8032"
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8032/health"]
      interval: 2m
      timeout: 10s
      retries: 3
    labels:
      - "coolify.managed=true"
      - "coolify.service=file-search"

  # Web Search - Real-time Web Search
  web-search:
    image: python:3.11-slim
    container_name: upsc-web-search
    restart: unless-stopped
    working_dir: /app
    command: python -m http.server 8030
    ports:
      - "8030:8030"
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 2m
      timeout: 10s
      retries: 3
    labels:
      - "coolify.managed=true"
      - "coolify.service=web-search"

networks:
  coolify:
    external: true
