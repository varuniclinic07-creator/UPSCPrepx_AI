# ============================================
# UPSC Crawl4AI - Coolify Production Deployment
# Self-hosted at 89.117.60.144:8000
# ============================================

version: '3.8'

services:
  crawl4ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    
    image: upsc-crawl4ai:latest
    container_name: upsc-crawl4ai
    restart: unless-stopped
    
    # Environment Variables
    environment:
      # === REQUIRED: Supabase ===
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      
      # === REQUIRED: API Security ===
      API_TOKEN: ${CRAWL4AI_API_TOKEN}
      API_PORT: 11235
      
      # === CORS Configuration ===
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      
      # === Crawler Settings ===
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_CONCURRENT_REQUESTS: ${MAX_CONCURRENT_REQUESTS:-3}
      DEFAULT_RATE_LIMIT: ${DEFAULT_RATE_LIMIT:-3.0}
      RESPECT_ROBOTS_TXT: ${RESPECT_ROBOTS_TXT:-true}
      
      # === Performance ===
      PYTHONUNBUFFERED: "1"
      WORKERS: ${WORKERS:-2}
    
    # Port Mapping
    ports:
      - "11235:11235"
    
    # Persistent Storage
    volumes:
      - crawl4ai-logs:/app/logs:rw
      - crawl4ai-cache:/tmp/crawler-cache:rw
    
    # Network
    networks:
      - coolify
    
    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
      
      # Restart Policy
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    
    # Logging Configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    
    # Health Check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Security Options
    security_opt:
      - no-new-privileges:true
    
    # Read-only root filesystem (except volumes)
    read_only: false
    
    # Coolify Labels
    labels:
      - "coolify.managed=true"
      - "coolify.service=crawl4ai"
      - "coolify.type=application"
      - "coolify.port=11235"
      - "coolify.healthcheck.enabled=true"
      - "coolify.healthcheck.path=/health"
      - "coolify.healthcheck.interval=120"
      - "traefik.enable=true"
      - "traefik.http.routers.crawl4ai.rule=Host(`crawl4ai.yourdomain.com`)"
      - "traefik.http.services.crawl4ai.loadbalancer.server.port=11235"

# Volumes
volumes:
  crawl4ai-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/upsc-crawl4ai/logs
  
  crawl4ai-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/upsc-crawl4ai/cache

# Networks
networks:
  coolify:
    external: true
    name: coolify
