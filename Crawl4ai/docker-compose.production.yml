version: '3.8'

services:
  crawl4ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upsc-crawl4ai
    restart: unless-stopped
    
    environment:
      # Supabase (REQUIRED)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      
      # API Security (REQUIRED)
      API_TOKEN: ${CRAWL4AI_API_TOKEN}
      API_PORT: 11235
      
      # Next.js App URL for CORS
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      
      # Crawler Settings
      LOG_LEVEL: INFO
      MAX_CONCURRENT_REQUESTS: 3
      DEFAULT_RATE_LIMIT: 3.0
      RESPECT_ROBOTS_TXT: "true"
      
      # Performance
      PYTHONUNBUFFERED: "1"
      WORKERS: 2
    
    ports:
      - "11235:11235"
    
    volumes:
      - crawl4ai-logs:/app/logs:rw
      - crawl4ai-cache:/tmp/crawler-cache:rw
    
    networks:
      - coolify
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    
    security_opt:
      - no-new-privileges:true
    
    read_only: false
    
    labels:
      - "coolify.managed=true"
      - "coolify.service=crawl4ai"
      - "coolify.type=application"
      - "coolify.port=11235"

volumes:
  crawl4ai-logs:
    driver: local
  crawl4ai-cache:
    driver: local

networks:
  coolify:
    external: true
