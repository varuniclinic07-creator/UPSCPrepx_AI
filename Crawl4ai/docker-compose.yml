# UPSC Content Crawler - Docker Compose Configuration
version: '3.8'

services:
  upsc-crawler:
    build: .
    container_name: upsc-content-crawler
    restart: unless-stopped
    
    # Environment variables
    env_file:
      - .env
    
    # Volumes for persistence
    volumes:
      - ./logs:/app/logs
      - crawler-cache:/tmp/crawler-cache
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network
    networks:
      - crawler-network
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import os; from pathlib import Path; exit(0 if Path('/tmp/upsc_crawler.pid').exists() else 1)"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  crawler-cache:
    driver: local

networks:
  crawler-network:
    driver: bridge

