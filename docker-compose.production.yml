version: '3.8'

services:
  # ============================================
  # CORE SERVICES
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: upsc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - upsc-network

  minio:
    image: minio/minio:latest
    container_name: upsc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live' ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - upsc-network

  # ============================================
  # VIDEO RENDERING SERVICES
  # ============================================

  manim:
    build:
      context: ./docker/manim
      dockerfile: Dockerfile
    image: upsc-manim:latest
    container_name: upsc-manim
    restart: unless-stopped
    volumes:
      - manim_media:/manim/media
      - manim_output:/manim/output
    ports:
      - '8085:8080'
    environment:
      MANIM_QUALITY: ${MANIM_QUALITY:-medium_quality}
      PORT: 8080
      HERMES_GATEWAY_TOKEN: ${HERMES_GATEWAY_TOKEN}
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8080/health' ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - upsc-network

  remotion:
    build:
      context: ./docker/remotion
      dockerfile: Dockerfile
    image: upsc-remotion:latest
    container_name: upsc-remotion
    restart: unless-stopped
    volumes:
      - remotion_output:/app/output
      - remotion_cache:/app/frames
    ports:
      - '3002:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      HERMES_GATEWAY_TOKEN: ${HERMES_GATEWAY_TOKEN}
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:3001/health' ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - upsc-network

  ffmpeg-worker:
    image: linuxserver/ffmpeg:latest
    container_name: upsc-ffmpeg
    restart: unless-stopped
    volumes:
      - video_processing:/data
      - minio_data:/minio
    entrypoint: [ '/bin/sh', '-c', 'while true; do sleep 3600; done' ]
    networks:
      - upsc-network

  video-worker:
    image: node:20-alpine
    container_name: upsc-video-worker
    restart: unless-stopped
    working_dir: /app
    volumes:
      - video_processing:/data/videos
      - video_worker_modules:/app/node_modules
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      A4F_API_KEY: ${A4F_API_KEY}
      A4F_BASE_URL: ${A4F_BASE_URL}
      OUTPUT_DIR: /data/videos
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache ffmpeg git
        cd /app
        if [ ! -f package.json ]; then
          npm init -y
          npm install bullmq ioredis minio openai fluent-ffmpeg uuid
        fi
        cat > worker.js <<'EOF'
        const { Worker } = require('bullmq');
        const Redis = require('ioredis');
        const OpenAI = require('openai');

        const redis = new Redis({
          host: process.env.REDIS_HOST || 'redis',
          port: parseInt(process.env.REDIS_PORT || '6379'),
          password: process.env.REDIS_PASSWORD,
          maxRetriesPerRequest: null,
        });

        const openai = new OpenAI({
          apiKey: process.env.A4F_API_KEY,
          baseURL: process.env.A4F_BASE_URL,
        });

        const worker = new Worker('lecture-queue', async (job) => {
          console.log('Processing job:', job.name, job.data);
          const { topic, jobId } = job.data;
          
          try {
            await redis.hset('lecture:' + jobId, 'status', 'processing', 'progress', '10');
            
            const response = await openai.chat.completions.create({
              model: 'provider-3/grok-4.1-fast',
              messages: [
                { role: 'system', content: 'You are a UPSC educator.' },
                { role: 'user', content: 'Create lecture outline for: ' + topic }
              ],
              max_tokens: 2000,
            });
            
            await redis.hset('lecture:' + jobId, 'status', 'ready', 'progress', '100', 'outline', response.choices[0].message.content);
            console.log('Job complete:', jobId);
            return { success: true };
          } catch (error) {
            await redis.hset('lecture:' + jobId, 'status', 'failed', 'error', error.message);
            throw error;
          }
        }, { connection: redis, concurrency: 1 });

        worker.on('completed', (job) => console.log('Completed:', job.id));
        worker.on('failed', (job, err) => console.error('Failed:', job.id, err.message));

        console.log('Video Worker started. Waiting for jobs...');
        EOF
        node worker.js
    networks:
      - upsc-network

  # ============================================
  # AI & SEARCH SERVICES
  # ============================================

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: upsc-crawl4ai
    restart: unless-stopped
    ports:
      - '11235:11235'
    environment:
      CRAWL4AI_API_TOKEN: ${CRAWL4AI_TOKEN}
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:11235/health' ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - upsc-network

  web-search:
    image: python:3.11-slim
    container_name: upsc-web-search
    restart: unless-stopped
    working_dir: /app
    ports:
      - '8030:8030'
    environment:
      CRAWL4AI_URL: http://crawl4ai:11235
    depends_on:
      - crawl4ai
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir fastapi uvicorn httpx
        cat > main.py <<'EOF'
        from fastapi import FastAPI
        from pydantic import BaseModel
        import httpx
        import os

        app = FastAPI()
        CRAWL4AI_URL = os.getenv("CRAWL4AI_URL", "http://crawl4ai:11235")

        class SearchRequest(BaseModel):
            query: str
            limit: int = 10

        @app.get("/health")
        async def health():
            return {"status": "healthy"}

        @app.post("/search")
        async def search(request: SearchRequest):
            search_url = f"https://duckduckgo.com/?q={request.query}"
            async with httpx.AsyncClient(timeout=30.0) as client:
                try:
                    response = await client.post(
                        f"{CRAWL4AI_URL}/crawl",
                        json={"urls": [search_url], "extract_links": True, "max_depth": 1}
                    )
                    data = response.json()
                    results = [{"title": link.get("text", ""), "url": link.get("href", ""), 
                               "snippet": data.get("data", {}).get("markdown", "")[:200]}
                               for link in data.get("data", {}).get("links", [])[:request.limit]]
                    return {"results": results, "query": request.query, "total": len(results)}
                except:
                    return {"results": [], "query": request.query, "total": 0}
        EOF
        uvicorn main:app --host 0.0.0.0 --port 8030
    networks:
      - upsc-network

  autodoc:
    image: python:3.11-slim
    container_name: upsc-autodoc
    restart: unless-stopped
    working_dir: /app
    volumes:
      - autodoc_data:/app/data
      - minio_data:/materials
    ports:
      - '8031:8031'
    environment:
      AI_PROVIDER_URL: ${A4F_BASE_URL}
      A4F_API_KEY: ${A4F_API_KEY}
      MATERIALS_PATH: /materials
    command:
      - /bin/sh
      - -c
      - |
        apt-get update && apt-get install -y tesseract-ocr poppler-utils
        pip install --no-cache-dir fastapi uvicorn httpx pypdf2 python-docx
        cat > main.py <<'EOF'
        from fastapi import FastAPI
        from pydantic import BaseModel
        from typing import List, Optional

        app = FastAPI()

        class DocumentRequest(BaseModel):
            query: str
            documents: Optional[List[dict]] = []

        @app.get("/health")
        async def health():
            return {"status": "healthy"}

        @app.post("/analyze")
        async def analyze(request: DocumentRequest):
            return {"answer": f"Analysis for: {request.query}", "sources": [],
                    "agentsUsed": ["retriever", "summarizer"], "processingTime": 1000}
        EOF
        uvicorn main:app --host 0.0.0.0 --port 8031
    networks:
      - upsc-network

  file-search:
    image: python:3.11-slim
    container_name: upsc-file-search
    restart: unless-stopped
    working_dir: /app
    volumes:
      - file_search_data:/app/data
      - minio_data:/materials
    ports:
      - '8032:8032'
    environment:
      AI_PROVIDER_URL: ${A4F_BASE_URL}
      A4F_API_KEY: ${A4F_API_KEY}
      MATERIALS_PATH: /materials
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir fastapi uvicorn httpx
        cat > main.py <<'EOF'
        from fastapi import FastAPI
        from pydantic import BaseModel
        from typing import List, Optional

        app = FastAPI()

        class FileSearchRequest(BaseModel):
            query: str
            materialIds: Optional[List[str]] = []

        @app.get("/health")
        async def health():
            return {"status": "healthy"}

        @app.post("/search")
        async def search(request: FileSearchRequest):
            return {"results": [], "totalResults": 0, "query": request.query,
                    "materialsSearched": 0, "navigationPath": [], "processingTime": 500}
        EOF
        uvicorn main:app --host 0.0.0.0 --port 8032
    networks:
      - upsc-network

  # ============================================
  # MONITORING & ANALYTICS
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    container_name: upsc-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - prometheus_data:/prometheus
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /etc/prometheus/prometheus.yml <<'EOF'
        global:
          scrape_interval: 15s
          evaluation_interval: 15s
        scrape_configs:
          - job_name: 'prometheus'
            static_configs:
              - targets: ['localhost:9090']
          - job_name: 'redis'
            static_configs:
              - targets: ['redis:6379']
          - job_name: 'minio'
            static_configs:
              - targets: ['minio:9000']
        EOF
        /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --storage.tsdb.retention.time=15d --web.enable-lifecycle
    healthcheck:
      test: [ 'CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9090/-/healthy' ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - upsc-network

  grafana:
    image: grafana/grafana:latest
    container_name: upsc-grafana
    restart: unless-stopped
    ports:
      - '3004:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: [ 'CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/health' ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - upsc-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: upsc-jaeger
    restart: unless-stopped
    ports:
      - '16686:16686'
      - '14268:14268'
      - '6831:6831/udp'
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    networks:
      - upsc-network

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: upsc-uptime-kuma
    restart: unless-stopped
    ports:
      - '3003:3001'
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - upsc-network

  plausible:
    image: plausible/analytics:latest
    container_name: upsc-plausible
    restart: unless-stopped
    ports:
      - '8089:8000'
    environment:
      BASE_URL: ${PLAUSIBLE_BASE_URL}
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      DATABASE_URL: postgres://postgres:${PLAUSIBLE_DB_PASSWORD}@plausible-db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible-events-db:8123/plausible
      DISABLE_REGISTRATION: ${PLAUSIBLE_DISABLE_REGISTRATION}
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      plausible-db:
        condition: service_healthy
      plausible-events-db:
        condition: service_started
    networks:
      - upsc-network

  plausible-db:
    image: postgres:14-alpine
    container_name: upsc-plausible-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD}
      POSTGRES_DB: plausible
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - upsc-network

  plausible-events-db:
    image: clickhouse/clickhouse-server:latest
    container_name: upsc-plausible-events
    restart: unless-stopped
    volumes:
      - plausible_events_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: plausible
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - upsc-network

  # ============================================
  # MAUTIC (Email Marketing)
  # ============================================

  mautic:
    image: mautic/mautic:5-apache
    container_name: upsc-mautic
    restart: unless-stopped
    ports:
      - '8083:80'
    environment:
      MAUTIC_DB_HOST: mautic-db
      MAUTIC_DB_USER: ${MAUTIC_DB_USER}
      MAUTIC_DB_PASSWORD: ${MAUTIC_DB_PASSWORD}
      MAUTIC_DB_NAME: ${MAUTIC_DB_NAME}
      MAUTIC_RUN_CRON_JOBS: 'true'
    volumes:
      - mautic_data:/var/www/html
    depends_on:
      - mautic-db
    networks:
      - upsc-network

  mautic-db:
    image: mysql:8.0
    container_name: upsc-mautic-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MAUTIC_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MAUTIC_DB_NAME}
      MYSQL_USER: ${MAUTIC_DB_USER}
      MYSQL_PASSWORD: ${MAUTIC_DB_PASSWORD}
    volumes:
      - mautic_db_data:/var/lib/mysql
    networks:
      - upsc-network

networks:
  upsc-network:
    driver: bridge

volumes:
  redis_data:
  minio_data:
  manim_media:
  manim_output:
  manim_scenes:
  remotion_output:
  remotion_cache:
  video_processing:
  video_worker_modules:
  autodoc_data:
  file_search_data:
  mautic_data:
  mautic_db_data:
  plausible_db_data:
  plausible_events_data:
  uptime_kuma_data:
  prometheus_data:
  grafana_data:
