version: '3.8'

services:
  # -----------------------------------------------------------------------
  # Next.js Web Application (The Core App)
  # -----------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: always
    env_file:
      - .env.local
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    networks:
      - upsc_network
    environment:
      - NODE_ENV=production

  # -----------------------------------------------------------------------
  # Agentic Worker (BullMQ / Queue Processing)
  # Handles Video Generation, Notifications, etc.
  # -----------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    env_file:
      - .env.local
    depends_on:
      - redis
      - db
    networks:
      - upsc_network
    environment:
      - NODE_ENV=production

  # -----------------------------------------------------------------------
  # Manim Service (Python Animation Engine)
  # -----------------------------------------------------------------------
  manim:
    build:
      context: ./manim-service
      dockerfile: Dockerfile
    restart: always
    volumes:
      - shared_assets:/tmp/manim_media
    networks:
      - upsc_network

  # -----------------------------------------------------------------------
  # Remotion Service (React Video Compositor)
  # -----------------------------------------------------------------------
  remotion:
    build:
      context: ./remotion-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - shared_assets:/tmp/video_assets
    networks:
      - upsc_network

  # -----------------------------------------------------------------------
  # Infrastructure: Redis (Queue & Caching)
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - upsc_network

  # -----------------------------------------------------------------------
  # Infrastructure: Database (PostgreSQL)
  # Note: In production, use Supabase (Cloud) or managed DigitalOcean DB.
  # This is for local dev or self-hosted setups.
  # -----------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: upsc_ai
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - upsc_network

volumes:
  redis_data:
  pg_data:
  shared_assets:

networks:
  upsc_network:
    driver: bridge
