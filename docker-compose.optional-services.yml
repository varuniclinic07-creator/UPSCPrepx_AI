version: '3.8'

services:
  # ==========================================
  # AUTODOC THINKER - Explanation Generator
  # ==========================================
  autodoc-thinker:
    build:
      context: ./AgenticServices
      dockerfile: autodoc/Dockerfile
    image: upsc-autodoc:latest
    container_name: upsc-autodoc
    restart: unless-stopped
    ports:
      - "8031:8031"
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8031/health"]
      interval: 2m
      timeout: 10s
      retries: 3
    labels:
      - "coolify.managed=true"
      - "coolify.service=autodoc"

  # ==========================================
  # FILE SEARCH - Semantic Search Service
  # ==========================================
  file-search:
    build:
      context: ./AgenticServices
      dockerfile: file-search/Dockerfile
    image: upsc-file-search:latest
    container_name: upsc-file-search
    restart: unless-stopped
    ports:
      - "8032:8032"
    volumes:
      - file-search-data:/app/data
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8032/health"]
      interval: 2m
      timeout: 10s
      retries: 3
    labels:
      - "coolify.managed=true"
      - "coolify.service=file-search"

  # ==========================================
  # WEB SEARCH - Real-time Web Search
  # ==========================================
  web-search:
    build:
      context: ./AgenticServices
      dockerfile: web-search/Dockerfile
    image: upsc-web-search:latest
    container_name: upsc-web-search
    restart: unless-stopped
    ports:
      - "8030:8030"
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 2m
      timeout: 10s
      retries: 3
    labels:
      - "coolify.managed=true"
      - "coolify.service=web-search"

  # ==========================================
  # PLAUSIBLE - Analytics
  # ==========================================
  plausible-db:
    image: postgres:14-alpine
    container_name: upsc-plausible-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD}
    volumes:
      - plausible-db-data:/var/lib/postgresql/data
    networks:
      - coolify

  plausible:
    image: plausible/analytics:latest
    container_name: upsc-plausible
    restart: unless-stopped
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    environment:
      BASE_URL: http://89.117.60.144:8088
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      DISABLE_REGISTRATION: "true"
      DATABASE_URL: postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible-db:5432/plausible
    ports:
      - "8088:8000"
    depends_on:
      - plausible-db
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    labels:
      - "coolify.managed=true"
      - "coolify.service=plausible"

  # ==========================================
  # MAUTIC - Marketing Automation
  # ==========================================
  mautic-db:
    image: mysql:8
    container_name: upsc-mautic-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MAUTIC_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: mautic
      MYSQL_USER: mautic
      MYSQL_PASSWORD: ${MAUTIC_DB_PASSWORD}
    volumes:
      - mautic-db-data:/var/lib/mysql
    networks:
      - coolify

  mautic:
    image: mautic/mautic:latest
    container_name: upsc-mautic
    restart: unless-stopped
    environment:
      MAUTIC_DB_HOST: mautic-db
      MAUTIC_DB_NAME: mautic
      MAUTIC_DB_USER: mautic
      MAUTIC_DB_PASSWORD: ${MAUTIC_DB_PASSWORD}
      MAUTIC_TRUSTED_PROXIES: 0.0.0.0/0
    ports:
      - "8083:80"
    volumes:
      - mautic-data:/var/www/html
    depends_on:
      - mautic-db
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    labels:
      - "coolify.managed=true"
      - "coolify.service=mautic"

  # ==========================================
  # UPTIME KUMA - Monitoring
  # ==========================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: upsc-uptime-kuma
    restart: unless-stopped
    ports:
      - "3003:3001"
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - coolify
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    labels:
      - "coolify.managed=true"
      - "coolify.service=uptime-kuma"

volumes:
  file-search-data:
    driver: local
  plausible-db-data:
    driver: local
  mautic-data:
    driver: local
  mautic-db-data:
    driver: local
  uptime-kuma-data:
    driver: local

networks:
  coolify:
    external: true
