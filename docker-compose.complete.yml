version: '3.8'

services:
  # ==========================================
  # REDIS - Cache & Queue (CRITICAL)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: upsc-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ==========================================
  # MINIO - Object Storage (CRITICAL)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: upsc-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # CRAWL4AI - Web Scraping (CRITICAL)
  # ==========================================
  crawl4ai:
    build:
      context: ./Crawl4ai
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: upsc-crawl4ai:latest
    container_name: upsc-crawl4ai
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      API_TOKEN: ${CRAWL4AI_API_TOKEN:-default_token}
      API_PORT: 11235
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      LOG_LEVEL: INFO
      MAX_CONCURRENT_REQUESTS: 3
      PYTHONUNBUFFERED: "1"
    ports:
      - "11235:11235"
    volumes:
      - crawl4ai-logs:/app/logs
      - crawl4ai-cache:/tmp/crawler-cache
    networks:
      - upsc-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11235/health || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # AUTODOC THINKER - Explanation Generator
  # ==========================================
  autodoc:
    build:
      context: ./AgenticServices/autodoc
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: upsc-autodoc:latest
    container_name: upsc-autodoc
    restart: unless-stopped
    environment:
      PORT: 8031
      NODE_ENV: production
    ports:
      - "8031:8031"
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8031/health || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # FILE SEARCH - Semantic Search
  # ==========================================
  file-search:
    build:
      context: ./AgenticServices/file-search
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: upsc-file-search:latest
    container_name: upsc-file-search
    restart: unless-stopped
    environment:
      PORT: 8032
      NODE_ENV: production
    ports:
      - "8032:8032"
    volumes:
      - file-search-data:/app/data
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8032/health || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # WEB SEARCH - Real-time Search
  # ==========================================
  web-search:
    build:
      context: ./AgenticServices/web-search
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: upsc-web-search:latest
    container_name: upsc-web-search
    restart: unless-stopped
    environment:
      PORT: 8030
      NODE_ENV: production
    ports:
      - "8030:8030"
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8030/health || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==========================================
  # PLAUSIBLE - Analytics
  # ==========================================
  plausible-db:
    image: postgres:14-alpine
    container_name: upsc-plausible-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD}
    volumes:
      - plausible-db-data:/var/lib/postgresql/data
    networks:
      - upsc-network

  plausible:
    image: plausible/analytics:latest
    container_name: upsc-plausible
    restart: unless-stopped
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    environment:
      BASE_URL: ${PLAUSIBLE_BASE_URL}
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      DISABLE_REGISTRATION: "true"
      DATABASE_URL: postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible-db:5432/plausible
    ports:
      - "8089:8000"
    depends_on:
      - plausible-db
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ==========================================
  # MAUTIC - Marketing Automation
  # ==========================================
  mautic-db:
    image: mysql:8
    container_name: upsc-mautic-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MAUTIC_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: mautic
      MYSQL_USER: mautic
      MYSQL_PASSWORD: ${MAUTIC_DB_PASSWORD}
    volumes:
      - mautic-db-data:/var/lib/mysql
    networks:
      - upsc-network

  mautic:
    image: mautic/mautic:latest
    container_name: upsc-mautic
    restart: unless-stopped
    environment:
      MAUTIC_DB_HOST: mautic-db
      MAUTIC_DB_NAME: mautic
      MAUTIC_DB_USER: mautic
      MAUTIC_DB_PASSWORD: ${MAUTIC_DB_PASSWORD}
      MAUTIC_TRUSTED_PROXIES: 0.0.0.0/0
    ports:
      - "8084:80"
    volumes:
      - mautic-data:/var/www/html
    depends_on:
      - mautic-db
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ==========================================
  # UPTIME KUMA - Monitoring
  # ==========================================
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: upsc-uptime-kuma
    restart: unless-stopped
    ports:
      - "3003:3001"
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # PROMETHEUS - Metrics Collection
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: upsc-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - upsc-network

  # ==========================================
  # GRAFANA - Visualization
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: upsc-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - upsc-network
    depends_on:
      - prometheus

  # ==========================================
  # JAEGER - Distributed Tracing
  # ==========================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: upsc-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "14268:14268"
    networks:
      - upsc-network

  # ==========================================
  # MANIM COMMUNITY - Animation Rendering
  # ==========================================
  manim:
    build:
      context: ./manim-service
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: upsc-manim:latest
    container_name: upsc-manim
    restart: unless-stopped
    environment:
      PORT: 8033
      NODE_ENV: production
      MANIM_QUALITY: medium_quality
    ports:
      - "8033:8033"
    volumes:
      - manim-output:/app/output
      - manim-cache:/app/cache
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8033/health || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # REMOTION - Video Rendering
  # ==========================================
  remotion:
    build:
      context: ./remotion-service
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: upsc-remotion:latest
    container_name: upsc-remotion
    restart: unless-stopped
    environment:
      PORT: 8034
      NODE_ENV: production
      REMOTION_CONCURRENCY: 2
    ports:
      - "8034:8034"
    volumes:
      - remotion-output:/app/output
      - remotion-cache:/app/cache
    networks:
      - upsc-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8034/health || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis-data:
  minio-data:
  crawl4ai-logs:
  crawl4ai-cache:
  file-search-data:
  plausible-db-data:
  mautic-data:
  mautic-db-data:
  uptime-kuma-data:
  prometheus-data:
  grafana-data:
  manim-output:
  manim-cache:
  remotion-output:
  remotion-cache:

networks:
  upsc-network:
    driver: bridge
