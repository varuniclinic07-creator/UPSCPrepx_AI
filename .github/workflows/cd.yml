# ═══════════════════════════════════════════════════════════════
# CD WORKFLOW - Build Docker Images, Push to Registry, Deploy
# Runs on push to main or manual trigger
# ═══════════════════════════════════════════════════════════════

name: CD - Build & Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    types: [closed]  # Trigger when PR is merged
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════
  # DETERMINE ENVIRONMENT
  # ═══════════════════════════════════════════════════════════
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy: ${{ steps.set-env.outputs.deploy }}

    steps:
      - name: Set environment based on trigger
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  # ═══════════════════════════════════════════════════════════
  # RUN TESTS (Skip if merged PR or skip_tests flag)
  # ═══════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ inputs.skip_tests != 'true' && github.event_name != 'pull_request' }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test -- --coverage
        env:
          CI: true
          REDIS_URL: redis://localhost:6379

  # ═══════════════════════════════════════════════════════════
  # BUILD WEB IMAGE
  # ═══════════════════════════════════════════════════════════
  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [determine-environment, test]
    permissions:
      contents: read
      packages: write

    outputs:
      web_image_tag: ${{ steps.meta.outputs.tags }}
      web_image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.determine-environment.outputs.environment }},enable=true

      - name: Build and push web image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: web-sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: web-sbom
          path: web-sbom.spdx.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # BUILD API IMAGE
  # ═══════════════════════════════════════════════════════════
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [determine-environment, test]
    permissions:
      contents: read
      packages: write

    outputs:
      api_image_tag: ${{ steps.meta.outputs.tags }}
      api_image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.determine-environment.outputs.environment }},enable=true

      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ═══════════════════════════════════════════════════════════
  # BUILD WORKER IMAGE
  # ═══════════════════════════════════════════════════════════
  build-worker:
    name: Build Worker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [determine-environment, test]
    permissions:
      contents: read
      packages: write

    outputs:
      worker_image_tag: ${{ steps.meta.outputs.tags }}
      worker_image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.determine-environment.outputs.environment }},enable=true

      - name: Build and push worker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ═══════════════════════════════════════════════════════════
  # DEPLOY TO ENVIRONMENT
  # ═══════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Environment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [determine-environment, build-web, build-api, build-worker]
    if: needs.determine-environment.outputs.deploy == 'true'
    environment:
      name: ${{ needs.determine-environment.outputs.environment }}
      url: ${{ secrets[needs.determine-environment.outputs.environment == 'production' && 'APP_URL' || 'STAGING_URL'] }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            echo "🚀 Starting deployment to ${{ needs.determine-environment.outputs.environment }}..."

            # Navigate to deployment directory
            cd ${{ secrets.DEPLOY_PATH || '/opt/upsc-master' }}

            # Create .env file from secrets
            cat > .env.production << 'EOF'
            NODE_ENV=production
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}
            RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}
            WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            OPENCODE_API_KEY=${{ secrets.OPENCODE_API_KEY }}
            KILO_API_KEY=${{ secrets.KILO_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            EOF

            # Pull new images
            echo "📦 Pulling Docker images..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ needs.determine-environment.outputs.environment }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ needs.determine-environment.outputs.environment }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ needs.determine-environment.outputs.environment }}

            # Stop old containers (graceful)
            echo "🛑 Stopping old containers..."
            docker compose -f docker-compose.production.yml down --remove-orphans || true

            # Start new containers
            echo "🚀 Starting new containers..."
            docker compose -f docker-compose.production.yml up -d

            # Wait for services to be healthy
            echo "⏳ Waiting for services to be healthy..."
            sleep 15

            # Health check
            echo "🏥 Running health checks..."
            curl -f http://localhost:3000/api/health || exit 1
            curl -f http://localhost:3001/api/health || exit 1
            curl -f http://localhost:3002/health || exit 1

            # Cleanup old images
            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h" || true

            echo "✅ Deployment completed successfully!"

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."

          # Retry loop for health check
          for i in {1..5}; do
            if curl -sf ${{ secrets[needs.determine-environment.outputs.environment == 'production' && 'APP_URL' || 'STAGING_URL'] }}/api/health; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Attempt $i failed, retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed after 5 attempts"
          exit 1

  # ═══════════════════════════════════════════════════════════
  # NOTIFY ON FAILURE
  # ═══════════════════════════════════════════════════════════
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "❌ Deployment failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Workflow: ${{ github.workflow }}"
          echo ""
          echo "Check logs at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Send Slack notification (optional)
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Deployment Failed*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ═══════════════════════════════════════════════════════════
  # CREATE DEPLOYMENT SUMMARY
  # ═══════════════════════════════════════════════════════════
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [determine-environment, build-web, build-api, build-worker, deploy]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Component | Status | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ needs.determine-environment.outputs.deploy == 'true' && '✅ Deployed' || '⏭️ Skipped' }} | ${{ needs.determine-environment.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | ${{ needs.build-web.result }} | ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ needs.determine-environment.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ needs.build-api.result }} | ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ needs.determine-environment.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | ${{ needs.build-worker.result }} | ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ needs.determine-environment.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} | ${{ secrets[needs.determine-environment.outputs.environment == 'production' && 'APP_URL' || 'STAGING_URL'] }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Commit Details](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
