# ═══════════════════════════════════════════════════════════════
# CI WORKFLOW - Build, Test, Lint
# Runs on every push and PR to main/develop branches
# ═══════════════════════════════════════════════════════════════

name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  # ═══════════════════════════════════════════════════════════
  # LINT & TYPE CHECK
  # ═══════════════════════════════════════════════════════════
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npm run lint
        env:
          CI: true

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        env:
          CI: true

      - name: Run Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx}"
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════
  # BUILD TEST
  # ═══════════════════════════════════════════════════════════
  build:
    name: Build Application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build application
        run: npm run build
        env:
          CI: true
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          # Provide minimal required env vars for build
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.test
          REDIS_URL: redis://localhost:6379

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # UNIT TESTS
  # ═══════════════════════════════════════════════════════════
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit tests with coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=json-summary
        env:
          CI: true
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # DOCKER BUILD TEST
  # ═══════════════════════════════════════════════════════════
  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: false
          load: true
          tags: upsc-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: false
          load: true
          tags: upsc-worker:test
          cache-from: type=gha

      - name: Run container health check
        run: |
          docker run --rm -d --name test-web -p 3000:3000 upsc-web:test
          sleep 10
          docker exec test-web curl -f http://localhost:3000/api/health || exit 1
          docker stop test-web

  # ═══════════════════════════════════════════════════════════
  # SECURITY SCAN
  # ═══════════════════════════════════════════════════════════
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run npm audit (production only)
        if: github.ref == 'refs/heads/main'
        run: npm audit --production --audit-level=moderate
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # REPORT STATUS
  # ═══════════════════════════════════════════════════════════
  report-status:
    name: Report CI Status
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, test, docker-build-test, security-scan]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "## CI Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          lint_status="${{ needs.lint-and-typecheck.result }}"
          build_status="${{ needs.build.result }}"
          test_status="${{ needs.test.result }}"
          docker_status="${{ needs.docker-build-test.result }}"
          security_status="${{ needs.security-scan.result }}"

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | $lint_status |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $build_status |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | $test_status |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | $docker_status |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | $security_status |" >> $GITHUB_STEP_SUMMARY

          # Fail if any critical job failed
          if [[ "$build_status" == "failure" ]] || [[ "$test_status" == "failure" ]]; then
            echo "❌ CI pipeline failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ CI pipeline passed" >> $GITHUB_STEP_SUMMARY
          fi
