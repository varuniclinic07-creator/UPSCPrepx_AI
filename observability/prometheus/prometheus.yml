# Prometheus Configuration
# UPSC PrepX-AI Observability Stack

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules files
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Next.js Application
  - job_name: 'upsc-prepx-ai'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: /api/metrics
    scheme: http
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):(\d+)'
        replacement: '${1}'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Postgres Exporter (Supabase)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Tempo (tracing backend)
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']

  # Loki (logging)
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
    basic_auth:
      username: admin
      password: ${GRAFANA_ADMIN_PASSWORD:-admin}
