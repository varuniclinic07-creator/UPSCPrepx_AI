# Prometheus Alert Rules
# UPSC PrepX-AI Alerting Configuration

groups:
  # Application Alerts
  - name: application_alerts
    interval: 30s
    rules:
      # High Error Rate
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status_code=~"5.."}[5m]))
          / sum(rate(http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"
          runbook_url: "https://runbooks.upsc-prepx.ai/alerts/high-error-rate"

      # High Latency
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route))
          > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected on route {{ $labels.route }}"
          description: "95th percentile latency is {{ $value }}s"

      # AI Provider Errors
      - alert: AIProviderErrors
        expr: |
          sum(rate(ai_errors_total[5m])) by (provider) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "AI provider {{ $labels.provider }} experiencing errors"
          description: "Error rate: {{ $value }} errors/sec"

      # AI Fallback Triggered
      - alert: AIFallbackTriggered
        expr: |
          increase(ai_fallback_total[10m]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AI provider fallback triggered multiple times"
          description: "{{ $value }} fallbacks in the last 10 minutes"

      # Authentication Failures
      - alert: HighAuthFailures
        expr: |
          sum(rate(auth_attempts_total{success="false"}[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "{{ $value }} failed auth attempts per second"

      # Security Events
      - alert: SecurityEventDetected
        expr: |
          increase(security_events_total{severity="critical"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Critical security event detected: {{ $labels.event_type }}"

  # Infrastructure Alerts
  - name: infrastructure_alerts
    interval: 30s
    rules:
      # High Memory Usage
      - alert: HighMemoryUsage
        expr: |
          (process_memory_bytes{type="rss"} / 1024 / 1024 / 1024) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage: {{ $value | humanize }}GB"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: |
          process_cpu_percent > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage: {{ $value }}%"

      # Event Loop Lag
      - alert: HighEventLoopLag
        expr: |
          histogram_quantile(0.95, sum(rate(nodejs_eventloop_lag_seconds_bucket[5m])) by (le))
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Node.js event loop lag"
          description: "95th percentile lag: {{ $value }}s"

  # Queue Alerts
  - name: queue_alerts
    interval: 30s
    rules:
      # Queue Backlog
      - alert: QueueBacklog
        expr: |
          sum(queue_size) by (queue_name) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Queue backlog detected: {{ $labels.queue_name }}"
          description: "Queue size: {{ $value }} jobs"

      # Queue Job Failures
      - alert: QueueJobFailures
        expr: |
          sum(rate(queue_jobs_total{status="failed"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High queue job failure rate"
          description: "{{ $value }} failed jobs per second"

  # Payment Alerts
  - name: payment_alerts
    interval: 30s
    rules:
      # Payment Failures
      - alert: HighPaymentFailures
        expr: |
          sum(rate(payment_attempts_total{status="failed"}[5m])) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High payment failure rate"
          description: "{{ $value }} failed payments per second"

      # Revenue Drop
      - alert: RevenueDrop
        expr: |
          sum(rate(payment_revenue_total[1h])) < 10
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Revenue significantly lower than expected"
          description: "Current revenue rate: ${{ $value }}/hour"

  # Database Alerts
  - name: database_alerts
    interval: 30s
    rules:
      # Slow Queries
      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95, sum(rate(db_query_duration_seconds_bucket[5m])) by (le, table))
          > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries on table {{ $labels.table }}"
          description: "95th percentile query time: {{ $value }}s"

      # High Query Rate
      - alert: HighQueryRate
        expr: |
          sum(rate(db_queries_total[5m])) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database query rate"
          description: "{{ $value }} queries per second"

  # Rate Limiting Alerts
  - name: rate_limit_alerts
    interval: 30s
    rules:
      # High Rate Limit Hits
      - alert: HighRateLimitHits
        expr: |
          sum(rate(rate_limit_hits_total[5m])) by (endpoint) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit hits on endpoint {{ $labels.endpoint }}"
          description: "{{ $value }} rate limit hits per second"
