# Tempo Configuration
# Distributed Tracing for UPSC PrepX-AI

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317
    zipkin:
      endpoint: 0.0.0.0:9411
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250
        thrift_binary:
          endpoint: 0.0.0.0:6832
        thrift_compact:
          endpoint: 0.0.0.0:6831

ingester:
  max_block_duration: 5m
  max_block_bytes: 104857600
  trace_idle_period: 10s
  max_traces_per_user: 100000

compactor:
  compaction:
    block_retention: 72h
    compacted_block_retention: 24h
    compaction_window: 4h
    max_compaction_objects: 1000000

metrics_generator:
  registry:
    enable_default_registry: true
  processor:
    local_blocks:
      filter_server_spans: false
    span_metrics:
      dimensions:
        - service_name
        - span_name
        - status_code
        - deployment_environment
    service_graphs:
      dimensions:
        - deployment_environment
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks
    pool:
      max_workers: 100
      queue_depth: 10000

overrides:
  defaults:
    metrics_generator:
      processors:
        - span-metrics
        - service-graphs
      generate_native_histograms: both

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
    metadata_slo:
      duration_slo: 5s
      throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
