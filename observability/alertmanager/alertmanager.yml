# Alertmanager Configuration
# Alert routing and notification for UPSC PrepX-AI

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.sendgrid.net:587'
  smtp_from: 'alerts@upsc-prepx.ai'
  smtp_auth_username: 'apikey'
  smtp_auth_password: '${SENDGRID_API_KEY}'
  slack_api_url: '${SLACK_WEBHOOK_URL}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts go to PagerDuty + Slack
    - match:
        severity: critical
      receiver: 'pagerduty-slack'
      continue: true
      group_wait: 10s
      repeat_interval: 1h

    # High severity to Slack + Email
    - match:
        severity: high
      receiver: 'slack-email'
      group_wait: 1m
      repeat_interval: 2h

    # Security alerts to dedicated channel
    - match:
        alert_type: security
      receiver: 'security-team'
      group_by: ['alertname', 'severity']
      repeat_interval: 30m

    # Payment alerts to finance team
    - match:
        alert_type: payment
      receiver: 'finance-team'
      repeat_interval: 1h

    # Warning alerts to Slack only
    - match:
        severity: warning
      receiver: 'slack-only'
      repeat_interval: 6h

# Inhibition rules
inhibit_rules:
  # If critical alert is firing, inhibit warning for same alert
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'service']

  # If service is down, inhibit all other alerts for that service
  - source_matchers:
      - alertname = "ServiceDown"
    target_matchers:
      - alertname != "ServiceDown"
    equal: ['service']

receivers:
  # Default receiver (all alerts)
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://webhook-receiver:5001/alerts'
        send_resolved: true

  # PagerDuty + Slack for critical
  - name: 'pagerduty-slack'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: critical
        description: '{{ .CommonAnnotations.summary }}'
    slack_configs:
      - channel: '#critical-alerts'
        send_resolved: true
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  # Slack + Email for high
  - name: 'slack-email'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '⚠️ HIGH: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    email_configs:
      - to: 'oncall@upsc-prepx.ai'
        subject: '[UPSC PrepX-AI] {{ .GroupLabels.alertname }}'
        body: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  # Security team
  - name: 'security-team'
    slack_configs:
      - channel: '#security-alerts'
        send_resolved: true
        title: '🔒 SECURITY: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}*Severity:* {{ .Labels.severity }}\n{{ .Annotations.description }}{{ end }}'
    email_configs:
      - to: 'security@upsc-prepx.ai'
        subject: '[SECURITY] {{ .GroupLabels.alertname }}'

  # Finance team
  - name: 'finance-team'
    slack_configs:
      - channel: '#finance-alerts'
        send_resolved: true
        title: '💰 PAYMENT: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    email_configs:
      - to: 'finance@upsc-prepx.ai'
        subject: '[PAYMENT] {{ .GroupLabels.alertname }}'

  # Slack only for warnings
  - name: 'slack-only'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '⚠️ {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        icon_emoji: ':warning:'

# Time intervals for muting
time_intervals:
  - name: 'business-hours'
    time_intervals:
      - weekdays: ['monday:friday']
        times:
          - start_time: '09:00'
            end_time: '18:00'

  - name: 'after-hours'
    time_intervals:
      - weekdays: ['monday:friday']
        times:
          - start_time: '18:00'
            end_time: '09:00'
      - weekdays: ['saturday', 'sunday']
