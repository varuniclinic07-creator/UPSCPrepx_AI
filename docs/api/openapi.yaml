openapi: 3.0.0
info:
  title: UPSC CSE Master API
  version: 1.0.0
  description: AI-powered UPSC preparation platform API

servers:
  - url: http://localhost:3000/api
    description: Development
  - url: https://api.upsccsemaster.com/api
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: object

    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        topic:
          type: string
        subject:
          type: string
        content:
          type: object
        created_at:
          type: string
          format: date-time

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service healthy

  /notes/generate:
    post:
      summary: Generate AI notes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic
                - subject
              properties:
                topic:
                  type: string
                  minLength: 3
                subject:
                  type: string
                level:
                  type: string
                  enum: [basic, intermediate, advanced]
      responses:
        '201':
          description: Notes generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '429':
          description: Rate limit exceeded

  /quiz/generate:
    post:
      summary: Generate quiz
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic
                - subject
                - difficulty
              properties:
                topic:
                  type: string
                subject:
                  type: string
                difficulty:
                  type: string
                  enum: [easy, medium, hard]
                questionCount:
                  type: integer
                  minimum: 5
                  maximum: 50
      responses:
        '201':
          description: Quiz generated
        '400':
          description: Validation error
        '401':
          description: Unauthorized
